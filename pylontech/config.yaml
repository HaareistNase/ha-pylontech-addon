name: Pylontech Battery Reader
version: "6.0"
slug: pylontech
description: Read Pylontech battery data
startup: services
boot: auto
host_network: true
arch:
  - amd64
  - aarch64
devices:
  - /dev/ttyUSB1
options:
  serial_port: /dev/serial/by-id/usb-FTDI_FT232R_USB_UART_ABSCDIG1-if000-port0
  baudrate: 115200
  mqtt_host: core-mosquitto
  mqtt_topic: pylontech/battery
schema:
  serial_port: str
  baudrate: int
  mqtt_host: str
  mqtt_topic: str
