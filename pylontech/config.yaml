name: Pylontech Reader
version: "1.2"
slug: pylontech
description: Read Pylontech battery via USB (FTDI)
startup: services
boot: auto
host_network: true
arch:
  - amd64
  - aarch64
devices:
  - /dev/serial/by-id/usb-FTDI_FT232R_USB_UART_ABSCDIG1-if00-port0
options:
  serial_port: /dev/ttyUSB0
  baudrate: 115200
  mqtt_host: core-mosquitto
  mqtt_topic: pylontech/battery
schema:
  serial_port: str
  baudrate: int
  mqtt_host: str
  mqtt_topic: str
