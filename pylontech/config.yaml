name: Pylontech Reader
version: "2.1"
slug: pylontech
description: Read Pylontech battery via USB (FTDI)
startup: services
boot: auto
host_network: true

arch:
  - amd64
  - aarch64

devices:
  - /dev/ttyUSB0
  - /dev/ttyUSB1
options:
  serial_port: /dev/ttyUSB0
  baudrate: 115200
  mqtt_host: core-mosquitto
  mqtt_topic: pylontech/battery

schema:
  serial_port: str
  baudrate: int
  mqtt_host: str
  mqtt_topic: str

full_access: true
